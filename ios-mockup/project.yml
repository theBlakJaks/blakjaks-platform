name: BlakJaksMockup
options:
  bundleIdPrefix: com.blakjaks
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15"
  groupSortPosition: top
  generateEmptyDirectories: true

targets:
  BlakJaksMockup:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: BlakJaksMockup
        excludes:
          - "**/*.md"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blakjaks.mockup
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: BlakJaksMockup/Resources/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
