name: BlakJaks
options:
  bundleIdPrefix: com.blakjaks
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15"
  groupSortPosition: top
  generateEmptyDirectories: true

packages:
  Alamofire:
    url: https://github.com/Alamofire/Alamofire.git
    from: 5.9.0
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess.git
    from: 4.2.2

targets:
  BlakJaks:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: BlakJaks
        excludes:
          - "**/*.md"
    dependencies:
      - package: Alamofire
      - package: KeychainAccess
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blakjaks.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: BlakJaks/Resources/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: VCFKNX362H
        # xcconfig picks up API_BASE_URL and ENVIRONMENT
        XCCONFIG_FILE: BlakJaks/Config/BlakJaks.xcconfig
      configs:
        Debug:
          XCCONFIG_FILE: BlakJaks/Config/Debug.xcconfig
        Release:
          XCCONFIG_FILE: BlakJaks/Config/Release.xcconfig
