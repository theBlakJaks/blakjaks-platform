<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; background:transparent; overflow:hidden; }
  canvas { display:block; width:100%; height:100%; }
</style>
</head>
<body>
<canvas id="onboarding-chip-canvas"></canvas>
<script src="three.min.js"></script>
<script>
(function () {
  let scene, camera, renderer, chips = [];
  const clock = new THREE.Clock();
  const TOP_Y = 18, BOTTOM_Y = -18;

  function resize() {
    if (!renderer) return;
    const w = window.innerWidth, h = window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  }

  function init() {
    const canvas = document.getElementById('onboarding-chip-canvas');
    if (!canvas) return;
    const w = window.innerWidth, h = window.innerHeight;
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(60, w / h, 0.1, 1000);
    camera.position.set(0, 0, 14);
    renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.setSize(w, h);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x000000, 0);
    window.addEventListener('resize', resize);
    scene.add(new THREE.AmbientLight(0xffffff, 0.4));
    const key = new THREE.DirectionalLight(0xffd700, 1.2);
    key.position.set(5, 10, 7); scene.add(key);
    const fill = new THREE.DirectionalLight(0x4488ff, 0.3);
    fill.position.set(-5, 5, -5); scene.add(fill);
    const rim = new THREE.PointLight(0xffd700, 0.6, 50);
    rim.position.set(0, -10, 10); scene.add(rim);
    for (let i = 0; i < 48; i++) addChip();
    animate();
  }

  function makeChipGeo() {
    const g = new THREE.Group();
    const gold = new THREE.MeshStandardMaterial({
      color: 0xffd700, metalness: 0.9, roughness: 0.2,
      emissive: 0x332200, emissiveIntensity: 0.1
    });
    const body = new THREE.Mesh(
      new THREE.CylinderGeometry(1, 1, 0.15, 64),
      new THREE.MeshStandardMaterial({ color: 0x1a1a1a, metalness: 0.3, roughness: 0.7 })
    );
    g.add(body);
    [[0.075], [-0.075]].forEach(([y]) => {
      const r = new THREE.Mesh(new THREE.TorusGeometry(0.97, 0.04, 16, 64), gold);
      r.rotation.x = Math.PI / 2; r.position.y = y; g.add(r);
    });
    [[0.078], [-0.078]].forEach(([y]) => {
      const r = new THREE.Mesh(new THREE.TorusGeometry(0.5, 0.025, 16, 64), gold);
      r.rotation.x = Math.PI / 2; r.position.y = y; g.add(r);
    });
    for (let i = 0; i < 16; i++) {
      const a = (i / 16) * Math.PI * 2;
      const n = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.16, 0.12), gold);
      n.position.set(Math.cos(a) * 0.95, 0, Math.sin(a) * 0.95);
      n.rotation.y = -a + Math.PI / 2; g.add(n);
    }
    return g;
  }

  function addChip() {
    const chip = makeChipGeo();
    const s = 0.25 + Math.random() * 0.25;
    chip.scale.set(s, s, s);
    chip.rotation.set(
      Math.random() * Math.PI * 2,
      Math.random() * Math.PI * 2,
      Math.random() * Math.PI * 2
    );
    const ryBase = (Math.random() - 0.5) * 5 + (Math.random() > 0.5 ? 3 : -3);
    const rzBase = (Math.random() - 0.5) * 4;
    const rxBase = (Math.random() - 0.5) * 4;
    chip.userData = {
      rx: rxBase, ry: ryBase, rz: rzBase,
      rxBase, ryBase, rzBase,
      wobbleSpd: 0.8 + Math.random() * 1.2,
      wobbleAmt: 0.3 + Math.random() * 0.5,
      wobbleOff: Math.random() * Math.PI * 2,
      vx: (Math.random() - 0.5) * 0.3,
      vy: -(1.5 + Math.random() * 2),
      vz: (Math.random() - 0.5) * 0.3,
      radius: s * 1.6
    };
    chip.position.set(
      (Math.random() - 0.5) * 10,
      (Math.random() - 0.5) * (TOP_Y * 2),
      (Math.random() - 0.5) * 4
    );
    scene.add(chip); chips.push(chip);
  }

  function reset(chip) {
    chip.userData.vx = (Math.random() - 0.5) * 0.3;
    chip.userData.vy = -(1.5 + Math.random() * 2);
    chip.userData.vz = (Math.random() - 0.5) * 0.3;
    chip.position.set(
      (Math.random() - 0.5) * 10,
      TOP_Y + Math.random() * 8,
      (Math.random() - 0.5) * 4
    );
  }

  function resolveCollisions() {
    for (let i = 0; i < chips.length; i++) {
      for (let j = i + 1; j < chips.length; j++) {
        const a = chips[i], b = chips[j];
        const dx = b.position.x - a.position.x;
        const dy = b.position.y - a.position.y;
        const dz = b.position.z - a.position.z;
        const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);
        const minDist = a.userData.radius + b.userData.radius;
        if (dist < minDist && dist > 0.001) {
          const nx = dx / dist, nz = dz / dist;
          const overlap = minDist - dist;
          const spring = overlap * 0.18;
          a.userData.vx -= spring * nx; a.userData.vz -= spring * nz;
          b.userData.vx += spring * nx; b.userData.vz += spring * nz;
          const kick = overlap * 2.5;
          a.userData.ry += kick * nz; a.userData.rz -= kick * nx;
          b.userData.ry -= kick * nz; b.userData.rz += kick * nx;
        }
      }
    }
  }

  function animate() {
    requestAnimationFrame(animate);
    const dt = Math.min(clock.getDelta(), 0.05);
    const t = clock.getElapsedTime();
    chips.forEach(c => {
      c.position.x += c.userData.vx * dt;
      c.position.y += c.userData.vy * dt;
      c.position.z += c.userData.vz * dt;
      const wobble = Math.sin(t * c.userData.wobbleSpd + c.userData.wobbleOff) * c.userData.wobbleAmt;
      c.rotation.x += (c.userData.rx + wobble) * dt;
      c.rotation.y += c.userData.ry * dt;
      c.rotation.z += (c.userData.rz + wobble * 0.5) * dt;
      c.userData.vx *= 0.94;
      c.userData.vz *= 0.94;
      c.userData.rx += (c.userData.rxBase - c.userData.rx) * 0.015;
      c.userData.ry += (c.userData.ryBase - c.userData.ry) * 0.015;
      c.userData.rz += (c.userData.rzBase - c.userData.rz) * 0.015;
      if (c.userData.vy > -1.5) c.userData.vy -= 1.2 * dt;
      if (c.userData.vy < -4)   c.userData.vy = -4;
      if (c.position.y < BOTTOM_Y) reset(c);
    });
    resolveCollisions();
    renderer.render(scene, camera);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
